<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OA Corporation — 오프라인 제휴처 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#0B0F19;--sf:#111827;--sf2:#1C2537;--sf3:#243047;--bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);--gold:#F5B731;--blue:#4F8EF7;--green:#34D399;--red:#F87171;--violet:#A78BFA;--text:#F1F5F9;--t2:#94A3B8;--t3:#475569;--r:14px;--shd:0 8px 32px rgba(0,0,0,.45)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:3px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--bd);background:rgba(11,15,25,.94);backdrop-filter:blur(12px);position:sticky;top:0;z-index:200}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.06em;color:var(--gold)}
.logo span{color:var(--t2);font-weight:500;font-size:15px;margin-left:8px}
.hdr-r{display:flex;align-items:center;gap:16px}
.live{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--green);letter-spacing:.1em;text-transform:uppercase}
.live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.hdr-date{font-size:12px;color:var(--t3)}
.loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9999}
.loading.hidden{display:none}
.spinner{width:40px;height:40px;border:3px solid var(--sf3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.main{padding:26px 32px 52px;max-width:1480px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;animation:fu .5s both}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shd)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.gold::before{background:var(--gold)}.kpi.blue::before{background:var(--blue)}.kpi.green::before{background:var(--green)}.kpi.violet::before{background:var(--violet)}
.kpi-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:800;line-height:1;margin-bottom:5px}
.kpi.gold .kpi-val{color:var(--gold)}.kpi.blue .kpi-val{color:var(--blue)}.kpi.green .kpi-val{color:var(--green)}.kpi.violet .kpi-val{color:var(--violet)}
.kpi-sub{font-size:11px;color:var(--t2)}.kpi-ico{position:absolute;top:16px;right:16px;font-size:24px;opacity:.12}
.pstrip{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px 22px;margin-bottom:20px;animation:fu .5s .08s both}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:14px}
.pbars{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.pbar-item{display:flex;flex-direction:column;gap:5px}
.pbar-name{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbar-track{height:5px;background:var(--sf2);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.pbar-ct{display:flex;justify-content:space-between;font-size:11px}
.pbar-n{color:var(--text);font-weight:600}.pbar-q{color:var(--t3)}
.view-tabs{display:flex;gap:8px;margin-bottom:20px;animation:fu .4s .1s both}
.vtab{background:var(--sf);border:1px solid var(--bd);border-radius:8px;color:var(--t2);font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;padding:9px 20px;cursor:pointer;transition:all .2s}
.vtab.act{background:var(--gold);border-color:var(--gold);color:#0B0F19}
.vtab:not(.act):hover{border-color:var(--blue);color:var(--blue)}
#listView{display:block}
.grid{display:grid;grid-template-columns:1fr 310px;gap:16px;align-items:start}
.tcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;animation:fu .5s .12s both}
.thdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:8px}
.ttitle{font-size:14px;font-weight:600}
.tactions{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.sinp{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;color:var(--text);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:6px 10px 6px 26px;outline:none;width:160px;transition:border-color .2s,width .3s}
.sinp:focus{border-color:var(--blue);width:200px}
.sw{position:relative}.sw-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px;pointer-events:none}
.flt{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;color:var(--t2);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:6px 9px;cursor:pointer;outline:none;transition:border-color .2s}
.flt:focus{border-color:var(--gold)}
.btn-add{background:var(--gold);color:#0B0F19;border:none;border-radius:7px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;padding:6px 13px;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.btn-add:hover{opacity:.82}
.btn-exp{background:var(--sf3);border:1px solid var(--bd2);border-radius:7px;color:var(--t2);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:6px 11px;cursor:pointer;transition:all .2s}
.btn-exp:hover{border-color:var(--blue);color:var(--blue)}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:8px 13px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);background:var(--sf2);white-space:nowrap;cursor:pointer;user-select:none;transition:color .2s}
thead th:hover{color:var(--t2)}
tbody tr{border-top:1px solid var(--bd);transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody td{padding:9px 13px;color:var(--t2);vertical-align:middle}
tbody td:first-child{color:var(--text);font-weight:500;font-size:13px}
.nodata td{text-align:center;padding:36px;color:var(--t3)}
.chip{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.ce{background:rgba(79,142,247,.15);color:var(--blue)}.cs{background:rgba(52,211,153,.15);color:var(--green)}.cu{background:rgba(245,183,49,.15);color:var(--gold)}.co{background:var(--sf2);color:var(--t3)}
.ctag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;background:var(--sf2);color:var(--t3);border:1px solid var(--bd);white-space:nowrap}
.qcell{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--text)}
.ract{display:flex;gap:4px}
.bico{background:var(--sf2);border:1px solid var(--bd);border-radius:5px;color:var(--t2);font-size:11px;padding:3px 7px;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.bico:hover{border-color:var(--blue);color:var(--blue)}.bico.del:hover{border-color:var(--red);color:var(--red)}
.pgfoot{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--bd);font-size:12px;color:var(--t3)}
.pgfoot span{color:var(--t2)}.pgbs{display:flex;gap:3px}
.pgb{background:var(--sf2);border:1px solid var(--bd);border-radius:5px;color:var(--t2);font-size:11px;padding:3px 8px;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.pgb:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}.pgb.act{background:var(--gold);border-color:var(--gold);color:#0B0F19;font-weight:700}.pgb:disabled{opacity:.3;cursor:default}
.rcol{display:flex;flex-direction:column;gap:16px}
.ccard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px;animation:fu .5s .18s both}
.ccard-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:14px}
.leg{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.li{display:flex;align-items:center;justify-content:space-between;font-size:11px}
.ll{display:flex;align-items:center;gap:6px}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ln{color:var(--t2)}.lv{color:var(--text);font-weight:600;font-family:'Barlow Condensed',sans-serif;font-size:13px}
#mapView{display:none}
.map-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;animation:fu .4s both}
.map-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:8px}
.map-title{font-size:14px;font-weight:600;color:var(--text)}
.map-note{font-size:11px;color:var(--t3)}
.map-flt-bar{display:flex;align-items:center;gap:8px;padding:10px 18px;border-bottom:1px solid var(--bd);background:var(--sf2);flex-wrap:wrap}
.map-flt-label{font-size:11px;color:var(--t3);margin-right:2px}
.map-leg-bar{display:flex;align-items:center;gap:14px;padding:8px 18px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.ml-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);white-space:nowrap}
.ml-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.5)}
#leafMap{height:560px;width:100%}
.map-footer{padding:10px 18px;font-size:11px;color:var(--t3);border-top:1px solid var(--bd)}
.map-footer strong{color:var(--t2)}
.leaflet-popup-content-wrapper{background:var(--sf)!important;border:1px solid var(--bd2)!important;border-radius:10px!important;box-shadow:0 4px 24px rgba(0,0,0,.5)!important;color:var(--text)!important}
.leaflet-popup-tip{background:var(--sf)!important}
.leaflet-popup-close-button{color:var(--t2)!important;font-size:16px!important}
.pop-name{font-size:13px;font-weight:700;margin-bottom:7px;color:var(--text);line-height:1.4}
.pop-row{font-size:11px;color:var(--t2);margin-bottom:3px}
.pop-row b{color:var(--text);font-weight:600}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.76);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center}
.ov.open{display:flex}
.modal{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:26px;width:440px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:mi .2s ease}
@keyframes mi{from{opacity:0;transform:scale(.95) translateY(8px)}}
.mt{font-size:15px;font-weight:700;margin-bottom:20px}
.fg{margin-bottom:13px}.fg label{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.fg input,.fg select{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:7px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;padding:9px 11px;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus{border-color:var(--gold)}
.fgr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.bcan{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;color:var(--t2);font-size:13px;font-family:'Noto Sans KR',sans-serif;padding:8px 16px;cursor:pointer}
.bsav{background:var(--gold);border:none;border-radius:7px;color:#0B0F19;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;padding:8px 20px;cursor:pointer}
.bsav:disabled{opacity:.5;cursor:not-allowed}
.cmod{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:26px;width:340px;max-width:95vw;animation:mi .2s ease;text-align:center}
.cico{font-size:32px;margin-bottom:10px}.cmsg{font-size:13px;color:var(--t2);margin-bottom:18px;line-height:1.6}.cnm{color:var(--text);font-weight:700}
.cbs{display:flex;gap:8px;justify-content:center}
.bdel{background:rgba(248,113,113,.12);border:1px solid var(--red);border-radius:7px;color:var(--red);font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;padding:8px 18px;cursor:pointer}
.bdel:hover{background:var(--red);color:white}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="loading" id="loadingScreen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--t2)">데이터 불러오는 중...</div>
</div>
<header class="hdr">
  <div class="logo">OA CORPORATION <span>오프라인 제휴처 현황</span></div>
  <div class="hdr-r"><div class="live">LIVE</div><div class="hdr-date" id="hdrDate"></div></div>
</header>
<main class="main">
  <div class="kpi-grid">
    <div class="kpi gold"><div class="kpi-ico">🤝</div><div class="kpi-lbl">총 제휴처 수</div><div class="kpi-val" id="kT">0</div><div class="kpi-sub">전체 계약 거래처</div></div>
    <div class="kpi blue"><div class="kpi-ico">📦</div><div class="kpi-lbl">총 제휴 수량</div><div class="kpi-val" id="kQ">0</div><div class="kpi-sub">누적 출고 대수</div></div>
    <div class="kpi green"><div class="kpi-ico">🏷️</div><div class="kpi-lbl">제품 종류</div><div class="kpi-val" id="kP">0</div><div class="kpi-sub">취급 제품 라인업</div></div>
    <div class="kpi violet"><div class="kpi-ico">🗂️</div><div class="kpi-lbl">업종 카테고리</div><div class="kpi-val" id="kC">0</div><div class="kpi-sub">제휴처 업종 분류</div></div>
  </div>
  <div class="pstrip"><div class="sec-lbl">제품별 현황</div><div class="pbars" id="pbars"></div></div>
  <div class="view-tabs">
    <button class="vtab act" id="tabList" onclick="switchView('list')">📋 목록</button>
    <button class="vtab" id="tabMap" onclick="switchView('map')">🗺️ 지도</button>
  </div>
  <div id="listView">
    <div class="grid">
      <div class="tcard">
        <div class="thdr">
          <div class="ttitle">제휴처 목록 <span id="fcnt" style="font-size:11px;color:var(--t3);margin-left:4px"></span></div>
          <div class="tactions">
            <div class="sw"><span class="sw-ico">🔍</span><input class="sinp" id="sinp" placeholder="거래처명 검색…" oninput="af()"/></div>
            <select class="flt" id="fc" onchange="af()"><option value="">전체 업종</option></select>
            <select class="flt" id="fp" onchange="af()"><option value="">전체 제품</option></select>
            <button class="btn-exp" onclick="expCSV()">↓ CSV</button>
            <button class="btn-add" onclick="openM()">+ 추가</button>
          </div>
        </div>
        <div class="tscroll">
          <table>
            <thead><tr>
              <th onclick="sb('name')">거래처명 <span id="sn"></span></th>
              <th onclick="sb('product')">제품 <span id="sp2"></span></th>
              <th onclick="sb('category')">업종 <span id="sc2"></span></th>
              <th onclick="sb('qty')">수량 <span id="sq2"></span></th>
              <th>관리</th>
            </tr></thead>
            <tbody id="tb"></tbody>
          </table>
        </div>
        <div class="pgfoot"><div id="pgi"></div><div class="pgbs" id="pgbs"></div></div>
      </div>
      <div class="rcol">
        <div class="ccard"><div class="ccard-title">업종별 수량 분포</div><canvas id="cc" height="210"></canvas><div class="leg" id="leg"></div></div>
        <div class="ccard"><div class="ccard-title">제품별 거래처 수</div><canvas id="pc" height="155"></canvas></div>
      </div>
    </div>
  </div>
  <div id="mapView">
    <div class="map-wrap">
      <div class="map-bar">
        <div class="map-title">🗺️ 거래처 위치 지도 <span id="mapCnt" style="font-size:12px;color:var(--t3);font-weight:400;margin-left:6px"></span></div>
        <div class="map-note">Kakao Local API 기반 정확 좌표</div>
      </div>
      <div class="map-flt-bar">
        <span class="map-flt-label">필터:</span>
        <select class="flt" id="mfc" onchange="renderMarkers()"><option value="">전체 업종</option></select>
        <select class="flt" id="mfp" onchange="renderMarkers()"><option value="">전체 제품</option></select>
      </div>
      <div class="map-leg-bar" id="mapLeg"></div>
      <div id="leafMap"></div>
      <div class="map-footer" id="mapFoot"></div>
    </div>
  </div>
</main>
<div class="ov" id="ov">
  <div class="modal">
    <div class="mt" id="mtitle">제휴처 추가</div>
    <div class="fg"><label>거래처명</label><input id="mn" placeholder="거래처명 입력"/></div>
    <div class="fgr">
      <div class="fg"><label>제품</label><select id="mprod"><option>에어리소닉</option><option>소닉플로우</option><option>슈퍼플로우</option><option>오아 퀵차지팩</option><option>보아르 플라미오 히터</option><option>기타</option></select></div>
      <div class="fg"><label>업종</label><select id="mcat"><option>스포츠센터</option><option>아파트커뮤니티</option><option>워터파크</option><option>찜질방/사우나</option><option>호텔&amp;리조트</option><option>펜션</option><option>펜션/게하</option><option>스튜디오</option><option>기타</option></select></div>
    </div>
    <div class="fg"><label>수량 (대)</label><input id="mq" type="number" min="0" placeholder="0"/></div>
    <div class="mfoot"><button class="bcan" onclick="closeM()">취소</button><button class="bsav" id="bsav" onclick="saveP()">저장</button></div>
  </div>
</div>
<div class="ov" id="cv">
  <div class="cmod">
    <div class="cico">🗑️</div>
    <div class="cmsg"><span class="cnm" id="cnm"></span>을(를)<br>삭제하시겠습니까?</div>
    <div class="cbs"><button class="bcan" onclick="closeCv()">취소</button><button class="bdel" onclick="doDel()">삭제</button></div>
  </div>
</div>
<script>

{"name":"빌드업피트니스 독산점","product":"슈퍼플로우","category":"스포츠센터","qty":10,"lat":37.4683795499377,"lng":126.887655517229},
{"name":"힐스테이트 리슈빌 강일","product":"슈퍼플로우","category":"아파트커뮤니티","qty":7,"lat":37.57287478622729,"lng":127.17423128834973},
{"name":"브라이튼여의도","product":"슈퍼플로우","category":"아파트커뮤니티","qty":9,"lat":37.52376023803487,"lng":126.93014502287835},
{"name":"호텔 더 보타닉 세운 명동","product":"슈퍼플로우","category":"호텔&리조트","qty":8,"lat":37.5675918422344,"lng":126.994313247461},
{"name":"와이파이 모바일","product":"오아 퀵차지팩","category":"기타","qty":100,"lat":37.44735379506237,"lng":126.44949050366476},
{"name":"휴가스테이 (고가 펜션)","product":"보아르 플라미오 히터","category":"기타","qty":1},
{"name":"해수월드(찜질&사우나)","product":"보아르 플라미오 히터","category":"기타","qty":2,"lat":35.1559,"lng":129.1335},
{"name":"퀸즈마리 산후조리원","product":"보아르 플라미오 히터","category":"기타","qty":1,"lat":37.5555221677505,"lng":126.864678512079}
];

const PCOL={'에어리소닉':'#4F8EF7','소닉플로우':'#34D399','슈퍼플로우':'#F5B731','오아 퀵차지팩':'#A78BFA','보아르 플라미오 히터':'#F87171','기타':'#94A3B8'};
const CC=['#4F8EF7','#34D399','#F5B731','#F87171','#A78BFA','#22D3EE','#FB923C','#EC4899'];
const DRYER=['에어리소닉','소닉플로우','슈퍼플로우'];

let db,pts=[],eid=null,did=null,pg=1,ps=20,sk_='name',sd=1,cc=null,pc2=null;
let leafMap=null,mGrp=null;

firebase.initializeApp(firebaseConfig);
db=firebase.firestore();

async function initApp(){
  document.getElementById('hdrDate').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  try{
    const snap=await db.collection('partners').limit(1).get();
    if(snap.empty){
      document.querySelector('#loadingScreen div:last-child').textContent='초기 데이터 입력 중... (최초 1회)';
      for(let i=0;i<SEED.length;i+=400){
        const batch=db.batch();
        SEED.slice(i,i+400).forEach(p=>{
          const d={name:p.name,product:p.product,category:p.category,qty:p.qty||0};
          if(p.lat&&p.lng){d.lat=p.lat;d.lng=p.lng;}
          batch.set(db.collection('partners').doc(),d);
        });
        await batch.commit();
      }
    }
  }catch(err){console.error('Seed:',err);}

  db.collection('partners').onSnapshot(snapshot=>{
    pts=snapshot.docs.map(doc=>({...doc.data(),_id:doc.id}));
    bflt();uall();
    if(leafMap)renderMarkers();
    document.getElementById('loadingScreen').classList.add('hidden');
  },err=>{
    document.getElementById('loadingScreen').innerHTML=`<div style="text-align:center;padding:32px;color:var(--red)">⚠️ 연결 오류<br><small style="color:var(--t2)">${err.message}</small></div>`;
  });
}

initApp();

function bflt(){
  const cats=[...new Set(pts.map(p=>p.category))].sort();
  const prods=[...new Set(pts.map(p=>p.product))].sort();
  ['fc','mfc'].forEach(id=>{const el=document.getElementById(id),v=el.value;el.innerHTML='<option value="">전체 업종</option>';cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;el.appendChild(o);});el.value=v;});
  ['fp','mfp'].forEach(id=>{const el=document.getElementById(id),v=el.value;el.innerHTML='<option value="">전체 제품</option>';prods.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;el.appendChild(o);});el.value=v;});
}
function gf(){
  const q=document.getElementById('sinp').value.toLowerCase();
  const fc=document.getElementById('fc').value,fp=document.getElementById('fp').value;
  return pts.filter(p=>(!q||p.name.toLowerCase().includes(q))&&(!fc||p.category===fc)&&(!fp||p.product===fp))
    .sort((a,b)=>{const av=sk_==='qty'?a[sk_]:(a[sk_]||''),bv=sk_==='qty'?b[sk_]:(b[sk_]||'');return typeof av==='number'?sd*(av-bv):sd*av.localeCompare(bv,'ko');});
}
function gmf(){const fc=document.getElementById('mfc').value,fp=document.getElementById('mfp').value;return pts.filter(p=>(!fc||p.category===fc)&&(!fp||p.product===fp));}
function af(){pg=1;rtbl();}
function sb(k){if(sk_===k)sd=-sd;else{sk_=k;sd=1;}['sn','sp2','sc2','sq2'].forEach(x=>document.getElementById(x).textContent='');const m={name:'sn',product:'sp2',category:'sc2',qty:'sq2'};document.getElementById(m[k]).textContent=sd===1?' ↑':' ↓';pg=1;rtbl();}
function uall(){ukpi();uprod();rtbl();rcharts();}
function ukpi(){const d=pts.filter(p=>DRYER.includes(p.product));an('kT',d.length);an('kQ',d.reduce((s,p)=>s+(p.qty||0),0));an('kP',new Set(pts.map(p=>p.product)).size);an('kC',new Set(pts.map(p=>p.category)).size);}
function an(id,t){const el=document.getElementById(id);const s=parseInt(el.textContent.replace(/,/g,''))||0;const dur=700,stp=16;let x=0;const tm=setInterval(()=>{x+=stp;const pp=Math.min(x/dur,1);el.textContent=Math.round(s+(t-s)*(pp<.5?2*pp*pp:-1+(4-2*pp)*pp)).toLocaleString();if(x>=dur)clearInterval(tm);},stp);}
function uprod(){
  const bp={};pts.forEach(p=>{if(!bp[p.product])bp[p.product]={n:0,q:0};bp[p.product].n++;bp[p.product].q+=p.qty||0;});
  const mx=Math.max(1,...Object.values(bp).map(v=>v.n));
  const c=document.getElementById('pbars');c.innerHTML='';
  Object.entries(bp).sort((a,b)=>b[1].n-a[1].n).forEach(([prod,v])=>{
    const col=PCOL[prod]||'#64748B',pct=Math.round(v.n/mx*100);
    const d=document.createElement('div');d.className='pbar-item';
    d.innerHTML=`<div class="pbar-name">${prod}</div><div class="pbar-track"><div class="pbar-fill" style="width:${pct}%;background:${col}"></div></div><div class="pbar-ct"><span class="pbar-n">${v.n}개소</span><span class="pbar-q">${v.q.toLocaleString()}대</span></div>`;
    c.appendChild(d);
  });
}
function rtbl(){
  const filtered=gf();const tp=Math.max(1,Math.ceil(filtered.length/ps));if(pg>tp)pg=tp;
  const sl=filtered.slice((pg-1)*ps,pg*ps);
  document.getElementById('fcnt').textContent=`(${filtered.length}개)`;
  const tb=document.getElementById('tb');
  if(!sl.length){tb.innerHTML='<tr class="nodata"><td colspan="5">검색 결과가 없습니다.</td></tr>';document.getElementById('pgi').innerHTML='';document.getElementById('pgbs').innerHTML='';return;}
  tb.innerHTML=sl.map(p=>{
    const c2=p.product==='에어리소닉'?'ce':p.product==='소닉플로우'?'cs':p.product==='슈퍼플로우'?'cu':'co';
    return `<tr><td>${e(p.name)}</td><td><span class="chip ${c2}">${e(p.product)}</span></td><td><span class="ctag">${e(p.category)}</span></td><td><span class="qcell">${(p.qty||0).toLocaleString()}</span></td><td><div class="ract"><button class="bico" onclick="openE('${p._id}')">✏️ 수정</button><button class="bico del" onclick="askD('${p._id}')">🗑️</button></div></td></tr>`;
  }).join('');
  rpg(filtered.length,tp);
}
function rpg(tot,tp){
  const s=(pg-1)*ps+1,en=Math.min(pg*ps,tot);
  document.getElementById('pgi').innerHTML=`<span>${s}–${en}</span> / ${tot}개`;
  const bs=document.getElementById('pgbs');bs.innerHTML='';
  const ab=(lbl,pp,dis,act)=>{const b=document.createElement('button');b.className='pgb'+(act?' act':'');b.textContent=lbl;b.disabled=dis;b.onclick=()=>{pg=pp;rtbl();};bs.appendChild(b);};
  ab('◀',pg-1,pg===1,false);
  pgr(pg,tp).forEach(pp=>{if(pp==='…'){const sp=document.createElement('span');sp.textContent='…';sp.style.cssText='color:var(--t3);padding:0 3px';bs.appendChild(sp);}else ab(pp,pp,false,pp===pg);});
  ab('▶',pg+1,pg===tp,false);
}
function pgr(cur,tot){if(tot<=7)return Array.from({length:tot},(_,i)=>i+1);if(cur<=4)return[1,2,3,4,5,'…',tot];if(cur>=tot-3)return[1,'…',tot-4,tot-3,tot-2,tot-1,tot];return[1,'…',cur-1,cur,cur+1,'…',tot];}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function rcharts(){
  const bycat={};pts.forEach(p=>{bycat[p.category]=(bycat[p.category]||0)+(p.qty||0);});
  const ce=Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  if(cc)cc.destroy();
  cc=new Chart(document.getElementById('cc'),{type:'doughnut',data:{labels:ce.map(x=>x[0]),datasets:[{data:ce.map(x=>x[1]),backgroundColor:CC,borderWidth:0,hoverOffset:5}]},options:{responsive:true,cutout:'66%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed.toLocaleString()}대`},backgroundColor:'#1C2537',titleColor:'#F1F5F9',bodyColor:'#94A3B8',borderColor:'rgba(255,255,255,.07)',borderWidth:1}}}});
  document.getElementById('leg').innerHTML=ce.map((x,i)=>`<div class="li"><div class="ll"><div class="ld" style="background:${CC[i%8]}"></div><span class="ln">${x[0]}</span></div><span class="lv">${x[1].toLocaleString()}</span></div>`).join('');
  const bp={};pts.forEach(p=>{bp[p.product]=(bp[p.product]||0)+1;});
  const pe=Object.entries(bp).sort((a,b)=>b[1]-a[1]);
  if(pc2)pc2.destroy();
  pc2=new Chart(document.getElementById('pc'),{type:'bar',data:{labels:pe.map(x=>x[0]),datasets:[{data:pe.map(x=>x[1]),backgroundColor:pe.map(x=>PCOL[x[0]]||'#64748B'),borderRadius:4,borderSkipped:false}]},options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.x}개소`},backgroundColor:'#1C2537',titleColor:'#F1F5F9',bodyColor:'#94A3B8',borderColor:'rgba(255,255,255,.07)',borderWidth:1}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#475569',font:{size:10}},border:{display:false}},y:{grid:{display:false},ticks:{color:'#94A3B8',font:{size:11}},border:{display:false}}}}});
}
function getCoord(p){if(p.lat&&p.lng)return[p.lat,p.lng];return null;}
function mkIcon(col){return L.divIcon({className:'',html:`<div style="width:11px;height:11px;border-radius:50%;background:${col};border:2px solid rgba(255,255,255,.9);box-shadow:0 2px 8px rgba(0,0,0,.5)"></div>`,iconSize:[11,11],iconAnchor:[5.5,5.5],popupAnchor:[0,-8]});}
function switchView(v){
  if(v==='map'){
    document.getElementById('listView').style.display='none';document.getElementById('mapView').style.display='block';
    document.getElementById('tabList').classList.remove('act');document.getElementById('tabMap').classList.add('act');
    if(!leafMap){leafMap=L.map('leafMap').setView([36.5,127.8],7);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(leafMap);mGrp=L.layerGroup().addTo(leafMap);}
    renderMarkers();
  }else{
    document.getElementById('mapView').style.display='none';document.getElementById('listView').style.display='block';
    document.getElementById('tabList').classList.add('act');document.getElementById('tabMap').classList.remove('act');
  }
}
function renderMarkers(){
  if(!leafMap)return;mGrp.clearLayers();
  const filtered=gmf();let placed=0,missed=[];
  filtered.forEach(p=>{
    const coord=getCoord(p);
    if(coord){L.marker(coord,{icon:mkIcon(PCOL[p.product]||'#94A3B8')}).bindPopup(`<div style="font-family:'Noto Sans KR',sans-serif;min-width:160px"><div class="pop-name">${e(p.name)}</div><div class="pop-row">제품: <b>${e(p.product)}</b></div><div class="pop-row">업종: <b>${e(p.category)}</b></div><div class="pop-row">수량: <b>${(p.qty||0).toLocaleString()}대</b></div></div>`,{maxWidth:230}).addTo(mGrp);placed++;}
    else missed.push(p.name);
  });
  document.getElementById('mapCnt').textContent=`${placed}개 표시 / 전체 ${filtered.length}개`;
  document.getElementById('mapLeg').innerHTML=[...new Set(filtered.map(p=>p.product))].map(p=>`<div class="ml-item"><div class="ml-dot" style="background:${PCOL[p]||'#94A3B8'}"></div>${p}</div>`).join('');
  document.getElementById('mapFoot').innerHTML=missed.length?`<strong>위치 미확인 ${missed.length}개:</strong> ${missed.slice(0,12).join(', ')}${missed.length>12?` 외 ${missed.length-12}개`:''}`:'' ;
}
function openM(){eid=null;document.getElementById('mtitle').textContent='제휴처 추가';['mn','mq'].forEach(id=>document.getElementById(id).value='');document.getElementById('mprod').value='에어리소닉';document.getElementById('mcat').value='스포츠센터';document.getElementById('ov').classList.add('open');document.getElementById('mn').focus();}
function openE(id){const p=pts.find(x=>x._id===id);if(!p)return;eid=id;document.getElementById('mtitle').textContent='제휴처 수정';document.getElementById('mn').value=p.name;document.getElementById('mprod').value=p.product;document.getElementById('mcat').value=p.category;document.getElementById('mq').value=p.qty;document.getElementById('ov').classList.add('open');}
function closeM(){document.getElementById('ov').classList.remove('open');}
async function saveP(){
  const nm=document.getElementById('mn').value.trim(),pr=document.getElementById('mprod').value,ca=document.getElementById('mcat').value,qty=parseInt(document.getElementById('mq').value)||0;
  if(!nm){document.getElementById('mn').focus();return;}
  const btn=document.getElementById('bsav');btn.disabled=true;btn.textContent='저장 중...';
  try{
    if(eid)await db.collection('partners').doc(eid).update({name:nm,product:pr,category:ca,qty});
    else await db.collection('partners').add({name:nm,product:pr,category:ca,qty});
    closeM();
  }catch(err){alert('저장 실패: '+err.message);}
  btn.disabled=false;btn.textContent='저장';
}
function askD(id){const p=pts.find(x=>x._id===id);if(!p)return;did=id;document.getElementById('cnm').textContent=p.name;document.getElementById('cv').classList.add('open');}
function closeCv(){document.getElementById('cv').classList.remove('open');did=null;}
async function doDel(){if(!did)return;try{await db.collection('partners').doc(did).delete();}catch(err){alert('삭제 실패: '+err.message);}closeCv();}
document.getElementById('ov').addEventListener('click',ev=>{if(ev.target===ev.currentTarget)closeM();});
document.getElementById('cv').addEventListener('click',ev=>{if(ev.target===ev.currentTarget)closeCv();});
document.addEventListener('keydown',ev=>{if(ev.key==='Escape'){closeM();closeCv();}});
function expCSV(){
  const f=gf();const rows=[['거래처명','제품','업종','수량'],...f.map(p=>[p.name,p.product,p.category,p.qty])];
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'\"\"\')}"` ).join(',')).join('\n');
  const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`OA제휴처현황_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
</script>
</body>
</html>
